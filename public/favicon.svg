<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background with slight radius -->
  <rect width="64" height="64" rx="14" fill="#0f0f0f"/>
  <!-- Bold R letterform -->
  <text x="8" y="50" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#CCFF00">R</text>
  <!-- Live pulse dot (top right) -->
  <circle cx="54" cy="12" r="6" fill="#FF3B30"/>
  <circle cx="54" cy="12" r="6" fill="#FF3B30" opacity="0.4">
    <animate attributeName="r" values="6;11;6" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
